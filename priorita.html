<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ework — Priorità</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .priorita-input-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .priorita-input {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 500;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .priorita-input:focus { border-color: var(--accent); }

    .btn-aggiungi {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-aggiungi:hover { opacity: 0.85; }

    .priorita-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }

    .priorita-item.fatto {
      opacity: 0.45;
    }

    .priorita-item.fatto .item-testo {
      text-decoration: line-through;
    }

    .checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      background: var(--bg);
    }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-size: 0.7rem;
    }

    .item-testo {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text);
    }

    .item-data {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .btn-elimina {
      background: none;
      border: none;
      color: var(--text-faint);
      cursor: pointer;
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .btn-elimina:hover { color: var(--danger); }

    .vuoto {
      background: var(--bg-card);
      border: 1px dashed var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-faint);
      font-style: italic;
    }

    .filtri {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filtro {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filtro.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <a href="index.html"><h1>Ework</h1></a>
      <div class="sub">Centro operativo</div>
    </div>

    <nav class="nav-section">
      <div class="nav-label">Principale</div>
      <a class="nav-item" href="index.html">
        <span class="icon">🎯</span> Centro di comando
      </a>
    </nav>

    <nav class="nav-section">
      <div class="nav-label">Operativo</div>
      <a class="nav-item active" href="priorita.html">
        <span class="icon">🔴</span> Priorità
      </a>
      <a class="nav-item" href="attivita.html">
        <span class="icon">📅</span> Attività
      </a>
      <a class="nav-item" href="#">
        <span class="icon">🤖</span> Agenti
      </a>
    </nav>

    <nav class="nav-section">
      <div class="nav-label">Lavoro</div>
      <a class="nav-item" href="#">
        <span class="icon">👤</span> Clienti
      </a>
      <a class="nav-item" href="#">
        <span class="icon">🏡</span> Proprietà
      </a>
      <a class="nav-item" href="#">
        <span class="icon">🔍</span> Ricerca Immobili
      </a>
    </nav>

    <nav class="nav-section">
      <div class="nav-label">Contenuti</div>
      <a class="nav-item" href="#">
        <span class="icon">📸</span> Social
      </a>
      <a class="nav-item" href="#">
        <span class="icon">🌿</span> Fonti
      </a>
    </nav>

    <div class="sidebar-bottom" id="dataOggi"></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2>Priorità</h2>
      <div class="date" id="dataEstesa"></div>
    </div>

    <div class="content">

      <div class="priorita-input-wrap">
        <input class="priorita-input" id="nuovaVoce" type="text" placeholder="Aggiungi una priorità…" />
        <button class="btn-aggiungi" onclick="aggiungi()">+ Aggiungi</button>
      </div>

      <div class="filtri">
        <button class="filtro active" onclick="filtra('tutte', this)">Tutte</button>
        <button class="filtro" onclick="filtra('aperte', this)">Da fare</button>
        <button class="filtro" onclick="filtra('fatte', this)">Completate</button>
      </div>

      <div id="lista"></div>

    </div>
  </main>

  <script>
    const d = new Date();
    const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
    const mesi = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
    document.getElementById('dataOggi').textContent = giorni[d.getDay()] + ' ' + d.getDate() + ' ' + mesi[d.getMonth()];
    document.getElementById('dataEstesa').textContent = giorni[d.getDay()] + ' ' + d.getDate() + ' ' + mesi[d.getMonth()] + ' ' + d.getFullYear();

    let filtroAttivo = 'tutte';

    function carica() {
      return JSON.parse(localStorage.getItem('priorita') || '[]');
    }

    function salva(lista) {
      localStorage.setItem('priorita', JSON.stringify(lista));
    }

    function aggiungi() {
      const input = document.getElementById('nuovaVoce');
      const testo = input.value.trim();
      if (!testo) return;
      const lista = carica();
      lista.unshift({ id: Date.now(), testo, fatto: false, data: new Date().toLocaleDateString('it-IT') });
      salva(lista);
      input.value = '';
      render();
    }

    function toggle(id) {
      const lista = carica();
      const item = lista.find(i => i.id === id);
      if (item) item.fatto = !item.fatto;
      salva(lista);
      render();
    }

    function elimina(id) {
      const lista = carica().filter(i => i.id !== id);
      salva(lista);
      render();
    }

    function filtra(tipo, btn) {
      filtroAttivo = tipo;
      document.querySelectorAll('.filtro').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      let lista = carica();
      if (filtroAttivo === 'aperte') lista = lista.filter(i => !i.fatto);
      if (filtroAttivo === 'fatte') lista = lista.filter(i => i.fatto);

      const el = document.getElementById('lista');
      if (lista.length === 0) {
        el.innerHTML = '<div class="vuoto">Nessuna priorità.</div>';
        return;
      }
      el.innerHTML = lista.map(item => `
        <div class="priorita-item ${item.fatto ? 'fatto' : ''}">
          <div class="checkbox ${item.fatto ? 'checked' : ''}" onclick="toggle(${item.id})">
            ${item.fatto ? '✓' : ''}
          </div>
          <div class="item-testo">${item.testo}</div>
          <div class="item-data">${item.data}</div>
          <button class="btn-elimina" onclick="elimina(${item.id})">✕</button>
        </div>
      `).join('');
    }

    document.getElementById('nuovaVoce').addEventListener('keydown', e => {
      if (e.key === 'Enter') aggiungi();
    });

    render();
  </script>

</body>
</html>
